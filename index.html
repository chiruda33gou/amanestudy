<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都道府県ランキングクイズ ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
  :root{
    --pink: #FF8FB1;
    --pink-deep: #FF6B9D;
    --pink-pale: #FFE3EE;
    --purple: #B79CED;
    --purple-deep: #9678D9;
    --purple-pale: #F1E6FF;
    --mint: #5FD9B4;
    --mint-deep: #34BE97;
    --mint-pale: #E3FBF1;
    --yellow: #FFCB4C;
    --yellow-deep: #FFB238;
    --coral: #FF9086;
    --coral-deep: #FF6F63;
    --ink: #5C4162;
    --ink-soft: #86718E;
    --paper: #FFFDFB;
    --line: rgba(107,78,113,0.14);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    min-height: 100vh;
    font-family: 'Yusei Magic', sans-serif;
    color: var(--ink);
    font-size: 16px;
  }

  body{
    background: linear-gradient(160deg, #FFE3EE 0%, #F3E8FF 45%, #E3FBF1 100%);
    display:flex;
    justify-content:center;
    padding: 30px 16px 60px;
    position:relative;
    overflow-x:hidden;
  }

  /* ふわふわ背景の星とハート */
  .sky{
    position:fixed; inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }

  .sky span{
    position:absolute;
    opacity:0.5;
    filter: drop-shadow(0 2px 3px rgba(183,156,237,0.15));
  }

  @keyframes floaty{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-14px) rotate(8deg); }
  }

  .wrap{
    position:relative;
    z-index:1;
    width:100%;
    max-width: 480px;
  }

  header{
    text-align:center;
    margin-bottom: 18px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13.5px;
    font-weight:700;
    color: var(--purple-deep);
    background: #fff;
    border-radius: 999px;
    padding: 6px 16px;
    margin-bottom:10px;
    box-shadow: 0 3px 0 var(--purple-pale);
  }

  h1{
    font-family:'Mochiy Pop One', sans-serif;
    font-weight:400;
    font-size: 32px;
    margin: 0 0 8px;
    color: var(--pink-deep);
    text-shadow: 2px 2px 0 #fff, 3px 3px 0 rgba(183,156,237,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
  }

  h1 .moon{
    font-size: 26px;
    filter: drop-shadow(0 2px 2px rgba(183,156,237,0.4));
  }

  .sub{
    font-size:14.5px;
    color: var(--ink-soft);
    font-weight:500;
  }

  /* ランク★トレイル */
  .progress{
    display:flex;
    justify-content:center;
    gap: 8px;
    margin: 18px 0 16px;
  }

  .marker{
    width: 34px; height:34px;
    position:relative;
  }

  .marker svg{ width:100%; height:100%; }
  .marker.current svg{ animation: bounce 0.9s ease-in-out infinite; }

  @keyframes bounce{
    0%,100%{ transform: translateY(0) scale(1); }
    50%{ transform: translateY(-4px) scale(1.08); }
  }

  /* 解答済みボード */
  .answered-board{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    margin: 0 0 18px;
  }

  .answered-tile{
    border-radius: 14px;
    background: #fff;
    padding: 7px 3px;
    text-align:center;
    min-height: 50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    border: 2px solid var(--purple-pale);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease;
  }

  .answered-tile .r{
    font-size:10.5px;
    font-weight:700;
    color: var(--ink-soft);
  }

  .answered-tile .p{
    font-size:11.5px;
    font-weight:700;
    line-height:1.25;
    color: var(--ink-soft);
  }

  .answered-tile.pending{
    border-style:dashed;
    border-color: var(--purple-pale);
    background: #fff;
  }

  .answered-tile.correct{
    background: linear-gradient(160deg, var(--mint), var(--mint-deep));
    border-color: var(--mint-deep);
  }
  .answered-tile.correct .r, .answered-tile.correct .p{ color:#fff; }

  .answered-tile.wrong{
    background: linear-gradient(160deg, var(--coral), var(--coral-deep));
    border-color: var(--coral-deep);
  }
  .answered-tile.wrong .r, .answered-tile.wrong .p{ color:#fff; }

  .answered-tile.reveal{ animation: tileReveal 0.45s cubic-bezier(.34,1.56,.64,1); }
  @keyframes tileReveal{
    0%{ transform: scale(0.75); opacity:0.3; }
    60%{ transform: scale(1.08); opacity:1; }
    100%{ transform: scale(1); opacity:1; }
  }

  .card{
    background: var(--paper);
    border-radius: 28px;
    padding: 28px 22px 24px;
    position:relative;
    box-shadow: 0 14px 0 -6px rgba(183,156,237,0.25), 0 18px 32px rgba(255,143,177,0.22);
    border: 3px solid #fff;
  }

  .home-btn{
    position:absolute;
    top: 14px;
    left: 14px;
    display:inline-flex;
    align-items:center;
    gap: 4px;
    background:#fff;
    border: 2px solid var(--purple-pale);
    border-radius: 999px;
    padding: 6px 12px;
    font-family:'Yusei Magic', sans-serif;
    font-size: 12.5px;
    font-weight:700;
    color: var(--purple-deep);
    cursor:pointer;
    box-shadow: 0 3px 0 var(--purple-pale);
    z-index: 8;
    transition: transform 0.12s ease;
  }
  .home-btn:hover{ transform: translateY(-2px); }
  .home-btn:active{ transform: translateY(1px); box-shadow:none; }

  .card.celebrate{ animation: cardGlow 0.9s ease; }

  @keyframes cardGlow{
    0%{ box-shadow: 0 14px 0 -6px rgba(183,156,237,0.25), 0 18px 32px rgba(255,143,177,0.22); }
    25%{ box-shadow: 0 14px 0 -6px rgba(183,156,237,0.25), 0 0 0 10px rgba(255,203,76,0.4), 0 0 46px 14px rgba(255,203,76,0.35); }
    100%{ box-shadow: 0 14px 0 -6px rgba(183,156,237,0.25), 0 18px 32px rgba(255,143,177,0.22); }
  }

  .screen-flash{
    position:fixed; inset:0; z-index:9999; pointer-events:none;
    background: radial-gradient(circle at 50% 38%, rgba(255,203,76,0.45), rgba(255,203,76,0) 62%);
    opacity:0;
    animation: flashPulse 0.6s ease forwards;
  }
  @keyframes flashPulse{ 0%{opacity:0;} 18%{opacity:1;} 100%{opacity:0;} }

  .rank-tag{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin: 6px auto 16px;
    width: fit-content;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    border-radius: 999px;
    padding: 10px 24px;
    color:#fff;
    font-family:'Mochiy Pop One', sans-serif;
    font-size: 20px;
    box-shadow: 0 4px 0 var(--purple-deep);
  }

  .question{
    font-size:17px;
    line-height:1.8;
    text-align:center;
    margin: 0 0 22px;
    font-weight:500;
  }

  .question strong{
    color: var(--pink-deep);
    background: var(--pink-pale);
    border-radius: 8px;
    padding: 1px 7px;
  }

  .choices{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .choice{
    text-align:center;
    font-family:'Yusei Magic', sans-serif;
    font-size:17px;
    font-weight:700;
    padding: 16px 18px;
    background: #fff;
    border: 2.5px solid var(--purple-pale);
    border-radius: 18px;
    cursor:pointer;
    color: var(--ink);
    transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    position:relative;
  }

  .choice:nth-child(4n+1){ background: #fff; }
  .choice:nth-child(4n+2){ background: #fff; }

  .choice:hover:not(:disabled){
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 6px 0 var(--purple-pale);
    border-color: var(--purple);
  }

  .choice:disabled{ cursor:default; }

  .choice.correct{
    background: linear-gradient(135deg, var(--mint), var(--mint-deep));
    border-color: var(--mint-deep);
    color: #fff;
    overflow:visible;
    z-index:2;
  }

  .choice.correct.pop{ animation: correctPop 0.6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes correctPop{
    0%{ transform: scale(1); }
    35%{ transform: scale(1.08) rotate(-1deg); box-shadow: 0 0 0 8px rgba(255,203,76,0.35); }
    65%{ transform: scale(0.97) rotate(0.5deg); }
    100%{ transform: scale(1); }
  }

  .choice.wrong{
    background: linear-gradient(135deg, var(--coral), var(--coral-deep));
    border-color: var(--coral-deep);
    color:#fff;
  }
  .choice.wrong.shake{ animation: wrongShake 0.4s ease; }
  @keyframes wrongShake{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-5px); }
    40%{ transform: translateX(4px); }
    60%{ transform: translateX(-3px); }
    80%{ transform: translateX(2px); }
  }

  .choice .mark{ margin-left:6px; font-weight:800; }
  .choice .mark.mark-correct{
    display:inline-block;
    animation: markPop 0.5s 0.15s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes markPop{
    0%{ transform: scale(0) rotate(-30deg); opacity:0; }
    70%{ transform: scale(1.3) rotate(6deg); opacity:1; }
    100%{ transform: scale(1) rotate(0deg); opacity:1; }
  }

  .confetti-burst{ position:absolute; inset:0; pointer-events:none; overflow:visible; z-index:5; }
  .confetti-piece{
    position:absolute; top:50%; left:50%;
    width: var(--size, 8px); height: var(--size, 8px);
    background: var(--piece-color, var(--pink));
    border-radius: var(--shape, 3px);
    opacity:0;
    animation: confettiFly var(--dur, 0.8s) var(--delay, 0s) ease-out forwards;
  }
  @keyframes confettiFly{
    0%{ opacity:1; transform: translate(-50%,-50%) rotate(0deg) scale(1); }
    100%{ opacity:0; transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--rot)) scale(0.6); }
  }

  .confetti-piece.rain{
    top:0; left: var(--x, 50%);
    transform: translate(-50%, -20px);
    animation: confettiRain var(--dur, 1.1s) var(--delay, 0s) ease-in forwards;
  }
  @keyframes confettiRain{
    0%{ opacity:0; transform: translate(-50%, -20px) rotate(0deg); }
    10%{ opacity:1; }
    100%{ opacity:0; transform: translate(calc(-50% + var(--driftx, 0px)), var(--fally, 340px)) rotate(var(--rot, 360deg)); }
  }

  /* せいかいスタンプ */
  .hanko{
    position:absolute;
    top: -20px; right: -10px;
    min-width: 88px;
    padding: 10px 14px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--yellow), var(--pink-deep));
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-family:'Mochiy Pop One', sans-serif;
    font-size: 15px;
    box-shadow: 0 5px 0 var(--purple-deep), 0 8px 18px rgba(183,156,237,0.4);
    transform: rotate(-10deg) scale(0);
    opacity:0;
    z-index:6;
    animation: stampIn 0.6s 0.05s cubic-bezier(.2,1.7,.4,1) forwards;
    pointer-events:none;
  }
  @keyframes stampIn{
    0%{ transform: rotate(-34deg) scale(2.6); opacity:0; }
    45%{ transform: rotate(-6deg) scale(0.9); opacity:1; }
    65%{ transform: rotate(-12deg) scale(1.08); }
    100%{ transform: rotate(-10deg) scale(1); opacity:1; }
  }

  .feedback{
    min-height: 22px;
    margin-top: 16px;
    font-size: 14.5px;
    text-align:center;
    color: var(--ink-soft);
    line-height:1.7;
    font-weight:500;
  }
  .feedback.correct-text{ color: var(--mint-deep); font-weight:700; }
  .feedback.wrong-text{ color: var(--coral-deep); font-weight:700; }

  .auto-advance{
    margin-top: 16px;
    height: 6px;
    background: var(--purple-pale);
    border-radius: 999px;
    overflow: hidden;
  }
  .auto-advance-bar{
    height:100%; width:100%;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    border-radius: 999px;
    transform-origin:left center;
    transform: scaleX(1);
  }
  .auto-advance-bar.running{
    animation-name: shrinkBar;
    animation-timing-function: linear;
    animation-fill-mode: forwards;
  }
  @keyframes shrinkBar{ from{ transform: scaleX(1); } to{ transform: scaleX(0); } }

  /* モード選択 */
  .mode-select{
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .mode-select .lead{
    font-size:14.5px;
    color: var(--ink-soft);
    text-align:center;
    margin-bottom: 4px;
    font-weight:500;
  }

  .mode-group-label{
    display:inline-flex;
    align-items:center;
    gap:6px;
    align-self:center;
    font-size:13px;
    font-weight:700;
    color: var(--purple-deep);
    background: var(--purple-pale);
    border-radius: 999px;
    padding: 5px 16px;
    margin: 6px 0 2px;
  }

  .mode-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .mode-btn{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 8px;
    text-align:center;
    padding: 18px 10px;
    background: #fff;
    border: 2.5px solid var(--purple-pale);
    border-radius: 20px;
    cursor:pointer;
    transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    font-family:'Yusei Magic', sans-serif;
  }

  .mode-btn:hover{
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 0 var(--purple-pale);
    border-color: var(--purple);
  }

  .mode-btn .badge{
    width: 56px; height:56px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    background: var(--purple-pale);
  }

  .mode-btn.wide .badge{ background: linear-gradient(135deg, #FFD9E8, #FFC1D9); }
  .mode-btn.narrow .badge{ background: linear-gradient(135deg, #E6DBFF, #D6C4FF); }
  .mode-btn.popMany .badge{ background: linear-gradient(135deg, #FFF0C2, #FFE29B); }
  .mode-btn.popFew .badge{ background: linear-gradient(135deg, #CFF7EA, #B3F0DB); }

  .mode-btn strong{
    font-size:14.5px;
    font-weight:700;
    color: var(--ink);
    line-height:1.4;
  }

  /* 結果画面 */
  .result{ text-align:center; }

  .result .eyebrow{ margin-bottom:10px; }

  .score{
    font-family:'Mochiy Pop One', sans-serif;
    font-size: 54px;
    color: var(--pink-deep);
    margin: 4px 0 2px;
    text-shadow: 2px 2px 0 #fff;
  }
  .score span{ font-size:20px; color: var(--ink-soft); font-family:'Yusei Magic', sans-serif; }

  .result-msg{
    font-size:14.5px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    line-height:1.8;
    font-weight:500;
  }

  .rank-list{
    text-align:left;
    list-style:none;
    padding:10px 14px; margin: 0 0 20px;
    background: var(--purple-pale);
    border-radius: 18px;
  }

  .rank-list li{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 9px 2px;
    font-size:14.5px;
    border-bottom: 1px dashed rgba(107,78,113,0.18);
  }
  .rank-list li:last-child{ border-bottom:none; }

  .rank-list .r{
    font-family:'Mochiy Pop One', sans-serif;
    font-size:14px;
    color: var(--pink-deep);
    width:26px;
  }
  .rank-list .pref{ flex:1; font-weight:700; }

  .retry-btn, .switch-btn{
    width:100%;
    padding: 15px;
    border-radius: 999px;
    font-family:'Yusei Magic', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    border:none;
  }

  .retry-btn{
    background: linear-gradient(135deg, var(--pink), var(--pink-deep));
    color:#fff;
    box-shadow: 0 5px 0 var(--purple-deep);
    margin-bottom: 10px;
  }
  .retry-btn:active{ transform: translateY(3px); box-shadow:none; }

  .switch-btn{
    background:#fff;
    color: var(--purple-deep);
    border: 2.5px solid var(--purple-pale);
  }
  .switch-btn:hover{ background: var(--purple-pale); }

  footer.note{
    text-align:center;
    margin-top: 18px;
    font-size:11px;
    color: var(--ink-soft);
    opacity:0.75;
  }

  @media (prefers-reduced-motion: reduce){
    .choice.correct.pop, .choice.wrong.shake, .confetti-piece, .hanko, .mark-correct,
    .card.celebrate, .screen-flash, .auto-advance-bar.running, .marker.current svg, .sky span{
      animation: none !important;
    }
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<div class="wrap">
  <header>
    <div class="eyebrow">🌙 まほうの都道府県クイズ ✨</div>
    <h1><span class="moon">🌛</span>都道府県ランキング<span class="moon">🌟</span></h1>
    <div class="sub" id="subtitle">覚えたいランキングを選んでね</div>
  </header>

  <div class="progress" id="progress"></div>
  <div class="answered-board" id="answeredBoard"></div>
  <div class="card" id="card"></div>

  <footer class="note">出典の目安：総務省統計局・国土地理院のデータをもとに作成</footer>
</div>

<script>
const MODES = {
  wide: {
    key: "wide", badge: "🌕", verb: "広い",
    subjectLabel: "面積が広い",
    title: "面積が広い都道府県 TOP5",
    subtitle: "面積が広い都道府県 TOP5 を覚えよう",
    resultTitle: "広さへん・けっか",
    goodMsg: "満点だよ！広さ番付、完全にマスターしたね♪",
    okMsg: "いいかんじ！もう一回で満点ねらえるよ。",

      { rank: 1, answer: "北海道" },
      { rank: 2, answer: "岩手県" },
      { rank: 3, answer: "福島県" },

      { rank: 5, answer: "新潟県" },
    ],
    fillers: ["青森県", "秋田県", "岐阜県", "山形県", "群馬県", "栃木県", "静岡県", "高知県"],
  },
  narrow: {
    key: "narrow", badge: "🌙", verb: "狭い",
    subjectLabel: "面積が狭い",
    title: "面積が狭い都道府県 TOP5",
    subtitle: "面積が狭い都道府県 TOP5 を覚えよう",
    resultTitle: "コンパクトへん・けっか",
    goodMsg: "満点だよ！コンパクト県もばっちり覚えたね♪",
    okMsg: "いいかんじ！もう一回で満点ねらえるよ。",
    lowMsg: "小さな県はまぎらわしいね。もう一度チャレンジしてみよう。",
    questions: [
      { rank: 1, answer: "香川県" },
      { rank: 2, answer: "大阪府" },
      { rank: 3, answer: "東京都" },
      { rank: 4, answer: "沖縄県" },
      { rank: 5, answer: "神奈川県" },
    ],
    fillers: ["佐賀県", "埼玉県", "山梨県", "福井県", "石川県", "千葉県", "愛知県", "奈良県"],
  },
  popMany: {
    key: "popMany", badge: "🌌", verb: "多い",
    subjectLabel: "人口が多い",
    title: "人口が多い都道府県 TOP5",
    subtitle: "人口が多い都道府県 TOP5 を覚えよう",
    resultTitle: "人口へん・けっか",
    goodMsg: "満点だよ！大都市けんのランキングもばっちり♪",
    okMsg: "いいかんじ！もう一回で満点ねらえるよ。",
    lowMsg: "大都市の顔ぶれをもう一度チェックしよう。",
    questions: [
      { rank: 1, answer: "東京都" },
      { rank: 2, answer: "神奈川県" },
      { rank: 3, answer: "大阪府" },
      { rank: 4, answer: "愛知県" },
      { rank: 5, answer: "埼玉県" },
    ],
    fillers: ["千葉県", "兵庫県", "北海道", "福岡県", "静岡県", "茨城県", "広島県", "京都府"],
  },
  popFew: {
    key: "popFew", badge: "⭐", verb: "少ない",
    subjectLabel: "人口が少ない",
    title: "人口が少ない都道府県 TOP5",
    subtitle: "人口が少ない都道府県 TOP5 を覚えよう",
    resultTitle: "人口へん・けっか",
    goodMsg: "満点だよ！人口が少ない県もばっちり覚えたね♪",
    okMsg: "いいかんじ！もう一回で満点ねらえるよ。",
    lowMsg: "山陰・四国の県はまぎらわしいね。もう一度チャレンジしてみよう。",
    questions: [
      { rank: 1, answer: "鳥取県" },
      { rank: 2, answer: "島根県" },
      { rank: 3, answer: "高知県" },
      { rank: 4, answer: "徳島県" },
      { rank: 5, answer: "福井県" },
    ],
    fillers: ["佐賀県", "山梨県", "和歌山県", "石川県", "秋田県", "富山県", "大分県", "宮崎県"],
  },
};

let currentMode = null;
let order = [];
let current = 0;
let score = 0;
let answered = false;
let answeredResults = [];
let fillerPool = [];
let fillerPointer = 0;
let quizToken = 0;

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildOrder(){
  order = currentMode.questions.map(q => ({...q}));
  fillerPool = shuffle(currentMode.fillers);
  fillerPointer = 0;
}

function getChoicesForQuestion(q, revealedAnswers){
  const allAnswers = currentMode.questions.map(x => x.answer);
  let pool = shuffle(allAnswers.filter(a => a !== q.answer && !revealedAnswers.includes(a)));
  const distractors = pool.slice(0, 3);
  while(distractors.length < 3 && fillerPointer < fillerPool.length){
    const filler = fillerPool[fillerPointer++];
    if(filler && !distractors.includes(filler)) distractors.push(filler);
  }
  return shuffle([q.answer, ...distractors]);
}

function markerSVG(kind){
  // kind: 'todo' | 'current' | 'done'
  if(kind === 'done'){
    return `<svg viewBox="0 0 34 34"><path d="M17 3 L21 13 L32 13 L23 20 L26.5 31 L17 24 L7.5 31 L11 20 L2 13 L13 13 Z" fill="#FFCB4C" stroke="#FFB238" stroke-width="1.5"/></svg>`;
  }
  if(kind === 'current'){
    return `<svg viewBox="0 0 34 34"><path d="M17 3 L21 13 L32 13 L23 20 L26.5 31 L17 24 L7.5 31 L11 20 L2 13 L13 13 Z" fill="#FF8FB1" stroke="#FF6B9D" stroke-width="1.5"/></svg>`;
  }
  return `<svg viewBox="0 0 34 34"><path d="M17 3 L21 13 L32 13 L23 20 L26.5 31 L17 24 L7.5 31 L11 20 L2 13 L13 13 Z" fill="#fff" stroke="#F1E6FF" stroke-width="2"/></svg>`;
}

function renderProgress(){
  const el = document.getElementById('progress');
  el.innerHTML = order.map((q,i) => {
    let kind = 'todo';
    if(i < current) kind = 'done';
    else if(i === current) kind = 'current';
    return `<div class="marker ${kind}">${markerSVG(kind)}</div>`;
  }).join('');
}

function renderAnsweredBoard(revealIndex){
  const el = document.getElementById('answeredBoard');
  if(!el) return;
  el.innerHTML = order.map((q, i) => {
    const res = answeredResults[i];
    if(!res){
      return `<div class="answered-tile pending"><span class="r">${q.rank}位</span><span class="p">？</span></div>`;
    }
    const cls = res.correct ? 'correct' : 'wrong';
    const revealCls = (i === revealIndex) ? 'reveal' : '';
    return `<div class="answered-tile ${cls} ${revealCls}"><span class="r">${q.rank}位</span><span class="p">${res.answer}</span></div>`;
  }).join('');
}

function renderQuestion(){
  answered = false;
  renderProgress();
  renderAnsweredBoard();
  const q = order[current];
  const revealedAnswers = answeredResults.slice(0, current).map(r => r && r.answer).filter(Boolean);
  const visibleChoices = getChoicesForQuestion(q, revealedAnswers);
  const card = document.getElementById('card');
  card.innerHTML = `
    <button class="home-btn" id="homeBtn">🏠 トップへ</button>
    <div class="rank-tag">🔮 第${q.rank}位</div>
    <div class="question">${currentMode.subjectLabel}都道府県、第<strong>${q.rank}位</strong>はどこかな?</div>
    <div class="choices" id="choices">
      ${visibleChoices.map(c => `<button class="choice" data-pref="${c}">${c}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="auto-advance" id="autoAdvance" style="display:none;">
      <div class="auto-advance-bar" id="autoBar"></div>
    </div>
  `;

  document.getElementById('homeBtn').addEventListener('click', goHome);
  document.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => selectChoice(btn, q));
  });
}

function goHome(){
  const hasProgress = current > 0 || answeredResults.some(Boolean);
  if(hasProgress){
    const ok = window.confirm('とちゅうでやめて、トップにもどる？\nここまでのきろくはリセットされるよ。');
    if(!ok) return;
  }
  quizToken++;
  renderModeSelect();
}

function selectChoice(btn, q){
  if(answered) return;
  answered = true;
  const chosen = btn.dataset.pref;
  const isCorrect = chosen === q.answer;
  if(isCorrect) score++;

  let correctBtn = null;

  document.querySelectorAll('.choice').forEach(b => {
    b.disabled = true;
    if(b.dataset.pref === q.answer){
      b.classList.add('correct', 'pop');
      b.innerHTML += '<span class="mark mark-correct">✨</span>';
      correctBtn = b;
    } else if(b === btn){
      b.classList.add('wrong', 'shake');
      b.innerHTML += '<span class="mark">×</span>';
    }
  });

  if(isCorrect && correctBtn){
    spawnConfetti(correctBtn);
    spawnConfettiRain(document.getElementById('card'));
    spawnStamp(document.getElementById('card'));
    spawnScreenFlash();
    const cardEl = document.getElementById('card');
    cardEl.classList.remove('celebrate');
    void cardEl.offsetWidth;
    cardEl.classList.add('celebrate');
  }

  answeredResults[current] = { answer: q.answer, correct: isCorrect };
  renderAnsweredBoard(current);

  const fb = document.getElementById('feedback');
  if(isCorrect){
    fb.textContent = `せいかい！第${q.rank}位は${q.answer}だよ。`;
    fb.className = 'feedback correct-text';
  } else {
    fb.textContent = `おしい！正しくは${q.answer}が第${q.rank}位だよ。`;
    fb.className = 'feedback wrong-text';
  }

  const delay = isCorrect ? 900 : 500;
  const autoAdvance = document.getElementById('autoAdvance');
  const autoBar = document.getElementById('autoBar');
  autoAdvance.style.display = 'block';
  autoBar.style.animationDuration = `${delay}ms`;
  autoBar.classList.add('running');

  const tokenAtSchedule = quizToken;
  setTimeout(() => {
    if(tokenAtSchedule === quizToken) nextQuestion();
  }, delay);
}

function spawnConfetti(targetBtn){
  const burst = document.createElement('div');
  burst.className = 'confetti-burst';
  const colors = ['#FF8FB1', '#B79CED', '#5FD9B4', '#FFCB4C', '#FFB6C8'];
  const shapes = ['3px', '50%', '2px'];
  const count = 28;

  for(let i=0;i<count;i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece';
    const angle = (Math.PI * 2 * i / count) + (Math.random()*0.6 - 0.3);
    const dist = 70 + Math.random()*100;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 25;
    p.style.setProperty('--tx', `${tx}px`);
    p.style.setProperty('--ty', `${ty}px`);
    p.style.setProperty('--rot', `${Math.round(Math.random()*720 - 360)}deg`);
    p.style.setProperty('--size', `${5 + Math.random()*6}px`);
    p.style.setProperty('--piece-color', colors[i % colors.length]);
    p.style.setProperty('--shape', shapes[i % shapes.length]);
    p.style.setProperty('--dur', `${0.75 + Math.random()*0.55}s`);
    p.style.setProperty('--delay', `${Math.random()*0.08}s`);
    burst.appendChild(p);
  }

  targetBtn.appendChild(burst);
  setTimeout(() => burst.remove(), 1500);
}

function spawnConfettiRain(card){
  const rain = document.createElement('div');
  rain.className = 'confetti-burst';
  const colors = ['#FF8FB1', '#B79CED', '#5FD9B4', '#FFCB4C', '#FFB6C8'];
  const shapes = ['3px', '50%', '2px'];
  const count = 34;
  const cardHeight = card.offsetHeight || 320;

  for(let i=0;i<count;i++){
    const p = document.createElement('span');
    p.className = 'confetti-piece rain';
    p.style.setProperty('--x', `${Math.random()*100}%`);
    p.style.setProperty('--driftx', `${Math.round(Math.random()*80 - 40)}px`);
    p.style.setProperty('--fally', `${cardHeight + 60 + Math.random()*60}px`);
    p.style.setProperty('--rot', `${Math.round(Math.random()*540 + 180)}deg`);
    p.style.setProperty('--size', `${5 + Math.random()*6}px`);
    p.style.setProperty('--piece-color', colors[i % colors.length]);
    p.style.setProperty('--shape', shapes[i % shapes.length]);
    p.style.setProperty('--dur', `${0.9 + Math.random()*0.7}s`);
    p.style.setProperty('--delay', `${Math.random()*0.35}s`);
    rain.appendChild(p);
  }

  card.appendChild(rain);
  setTimeout(() => rain.remove(), 2000);
}

function spawnScreenFlash(){
  const flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 700);
}

function spawnStamp(card){
  const old = card.querySelector('.hanko');
  if(old) old.remove();
  const stamp = document.createElement('div');
  stamp.className = 'hanko';
  stamp.textContent = '🌟せいかい♪';
  card.appendChild(stamp);
  setTimeout(() => stamp.remove(), 2200);
}

function nextQuestion(){
  current++;
  if(current >= order.length){
    renderResult();
  } else {
    renderQuestion();
  }
}

function renderResult(){
  const el = document.getElementById('progress');
  el.innerHTML = order.map(() => `<div class="marker">${markerSVG('done')}</div>`).join('');
  document.getElementById('answeredBoard').innerHTML = '';

  let msg = "";
  if(score === 5) msg = currentMode.goodMsg;
  else if(score >= 3) msg = currentMode.okMsg;
  else msg = currentMode.lowMsg;

  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="result">
      <div class="eyebrow">🎉 ${currentMode.resultTitle} 🎉</div>
      <div class="score">${score}<span>／5</span></div>
      <div class="result-msg">${msg}</div>
      <ul class="rank-list">
        ${currentMode.questions.map(q => `<li><span class="r">${q.rank}位</span><span class="pref">${q.answer}</span></li>`).join('')}
      </ul>
      <button class="retry-btn" id="retryBtn">もういちどチャレンジ</button>
      <button class="switch-btn" id="switchBtn">べつのクイズにする</button>
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', () => startQuiz(currentMode.key));
  document.getElementById('switchBtn').addEventListener('click', renderModeSelect);
}

function startQuiz(modeKey){
  quizToken++;
  currentMode = MODES[modeKey];
  document.getElementById('subtitle').textContent = currentMode.subtitle;
  current = 0;
  score = 0;
  answeredResults = [];
  buildOrder();
  renderQuestion();
}

function renderModeSelect(){
  quizToken++;
  document.getElementById('subtitle').textContent = "覚えたいランキングを選んでね";
  document.getElementById('progress').innerHTML = '';
  document.getElementById('answeredBoard').innerHTML = '';
  const card = document.getElementById('card');
  card.innerHTML = `
    <div class="mode-select">
      <div class="lead">やりたいクイズをタップしてね♪</div>
      <div class="mode-group-label">🌸 面積へん</div>
      <div class="mode-grid">
        <button class="mode-btn wide" id="btnWide">
          <span class="badge">🌕</span>
          <strong>広い都道府県<br>TOP5</strong>
        </button>
        <button class="mode-btn narrow" id="btnNarrow">
          <span class="badge">🌙</span>
          <strong>狭い都道府県<br>TOP5</strong>
        </button>
      </div>
      <div class="mode-group-label">🌟 人口へん</div>
      <div class="mode-grid">
        <button class="mode-btn popMany" id="btnPopMany">
          <span class="badge">🌌</span>
          <strong>人口が多い<br>TOP5</strong>
        </button>
        <button class="mode-btn popFew" id="btnPopFew">
          <span class="badge">⭐</span>
          <strong>人口が少ない<br>TOP5</strong>
        </button>
      </div>
    </div>
  `;
  document.getElementById('btnWide').addEventListener('click', () => startQuiz('wide'));
  document.getElementById('btnNarrow').addEventListener('click', () => startQuiz('narrow'));
  document.getElementById('btnPopMany').addEventListener('click', () => startQuiz('popMany'));
  document.getElementById('btnPopFew').addEventListener('click', () => startQuiz('popFew'));
}

function renderSky(){
  const el = document.getElementById('sky');
  const items = ['★','✦','☆','✧','🌙','⭐','🌛','✦'];
  const colors = ['#FF8FB1','#B79CED','#5FD9B4','#FFCB4C'];
  let html = '';
  for(let i=0;i<18;i++){
    const item = items[i % items.length];
    const color = colors[i % colors.length];
    const left = Math.round(Math.random()*100);
    const top = Math.round(Math.random()*100);
    const size = 14 + Math.round(Math.random()*18);
    const dur = 3 + Math.random()*3;
    const delay = Math.random()*3;
    html += `<span style="left:${left}%; top:${top}%; font-size:${size}px; color:${color}; animation: floaty ${dur}s ease-in-out ${delay}s infinite;">${item}</span>`;
  }
  el.innerHTML = html;
}

renderSky();
renderModeSelect();
</script>

</body>
</html>
